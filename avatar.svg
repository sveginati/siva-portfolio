<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Siva Veginati avatar</title>
  <desc id="desc">Stylized circular monogram for the portfolio hero.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#081225" flood-opacity="0.35" />
    </filter>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="256" fill="url(#bg)" />
  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#ring)" stroke-width="8" />
  <circle cx="178" cy="160" r="130" fill="url(#glow)" />
  <circle cx="332" cy="150" r="58" fill="#ffffff" opacity="0.08" />
  <circle cx="360" cy="370" r="72" fill="#ffffff" opacity="0.05" />
  <g filter="url(#shadow)">
    <text
      x="256"
      y="296"
      text-anchor="middle"
      font-family="Plus Jakarta Sans, Arial, sans-serif"
      font-size="150"
      font-weight="700"
      letter-spacing="-12"
      fill="#ffffff"
    >
      SV
    </text>
  </g>
  <circle cx="352" cy="352" r="12" fill="#22c55e" stroke="#ffffff" stroke-width="4" />
  <path d="M164 384c28 24 60 36 92 36 34 0 65-10 94-31" fill="none" stroke="#93c5fd" stroke-opacity="0.45" stroke-width="6" stroke-linecap="round" />
</svg>
